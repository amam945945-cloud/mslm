<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوصلة القبلة | تصميم مسلم</title>
    <style>
        :root {
            --primary: #001f3f;
            --gold: #d4af37;
            --bg: #121212;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .compass-card {
            background: linear-gradient(145deg, #1a1a1a, #001f3f);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            width: 320px;
        }
        /* تصميم الدائرة الخارجية للبوصلة */
        .compass-outer {
            width: 200px;
            height: 200px;
            border: 4px solid var(--gold);
            border-radius: 50%;
            margin: 30px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #002d5a 0%, #001f3f 100%);
        }
        /* السهم الذهبي */
        .needle {
            width: 6px;
            height: 90px;
            background: var(--gold);
            border-radius: 10px;
            position: relative;
            transform: rotate(45deg); /* زاوية تجريبية */
            transition: transform 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px var(--gold);
        }
        .needle::after {
            content: '';
            position: absolute;
            top: -15px;
            left: -7px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid var(--gold);
        }
        h2 { color: var(--gold); margin-bottom: 5px; }
        .direction-text { font-size: 14px; opacity: 0.7; }
        button {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        button:hover { background: var(--gold); color: var(--primary); }
    </style>
</head>
<body>

    <div class="compass-card">
        <h2>اتجاة القبلة 🕋</h2>
        <p class="direction-text">تصميم تقني تفاعلي</p>

        <div class="compass-outer">
            <div class="needle" id="qiblaNeedle"></div>
        </div>

        <div id="status">مكة المكرمة</div>
        <button onclick="rotateNeedle()">تحديد الاتجاه</button>
        
        <p style="font-size: 10px; margin-top: 25px; opacity: 0.5;">حقوق التصميم محفوظة لـ مُسلم العطوي © 2026</p>
    </div>

    <script>
        function rotateNeedle() {
            const needle = document.getElementById('qiblaNeedle');
            // توليد زاوية عشوائية لمحاكاة البحث عن القبلة ثم الاستقرار
            const randomDegree = Math.floor(Math.random() * 360) + 720; 
            needle.style.transform = `rotate(${randomDegree}deg)`;
            
            setTimeout(() => {
                // الاستقرار على زاوية القبلة التقريبية (مثلاً 135 درجة)
                needle.style.transform = `rotate(135deg)`;
            }, 2000);
        }
    </script>

</body>
</html>
